services:
  - type: web
    name: soltai-ai-agents
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd web && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: OPENAI_API_KEY
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: WEBHOOK_URL
        sync: false 